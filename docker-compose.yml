services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_governance
    ports:
      - "5432:5432"
    volumes:
      - ai_governance_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_governance"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  ai_governance_pg:
